<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">

<link rel="manifest" href="manifest.json">
<title>Rota Elétrica</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a0a0f; color:#fff; overflow:hidden; }
body { font-size:16px; }

#loading { position:fixed; inset:0; z-index:9999; background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .5s ease; }
#loading.hide { opacity:0; pointer-events:none; }
#loading .spinner { width:44px; height:44px; border:3px solid rgba(108,92,231,.15); border-top-color:#6C5CE7; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { margin-top:18px; color:#eee; font-size:20px; font-weight:600; letter-spacing:-.3px; }
#loading .sub { color:#666; font-size:14px; margin-top:4px; }

/* ---- HOME ---- */
#home { position:absolute; inset:0; z-index:500; display:flex; flex-direction:column; background:#0a0a0f; padding:16px 16px calc(env(safe-area-inset-bottom,0)+12px); transition:opacity .15s; }
#home.hidden { opacity:0; pointer-events:none; }
#home-header { text-align:center; padding:4px 0 12px; }
#home-header h1 { font-size:22px; color:#fff; font-weight:700; letter-spacing:-.5px; }
#home-header h1 span { color:#6C5CE7; }
#home-header p { font-size:13px; color:#666; margin-top:2px; }

#home-gps-area { margin-bottom:10px; }
#home-gps-acc { color:#555; font-size:11px; margin-top:3px; text-align:center; }
#home-search-bar { display:flex; gap:8px; margin-bottom:10px; }
#home-search { flex:1; padding:12px 16px; border:1px solid rgba(255,255,255,.06); border-radius:12px; font-size:16px; background:rgba(255,255,255,.04); color:#fff; outline:none; transition:border .2s; }
#home-search:focus { border-color:#6C5CE7; }
#home-search::placeholder { color:#444; font-size:15px; }
#home-btn-go { padding:12px 18px; border:none; border-radius:12px; background:#6C5CE7; color:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .2s; }
#home-btn-go:active { opacity:.7; }
#home-search-results { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); border-radius:12px; max-height:200px; overflow-y:auto; display:none; margin-bottom:10px; backdrop-filter:blur(20px); }
.search-item { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; font-size:14px; transition:background .15s; }
.search-item:last-child { border-bottom:none; }
.search-item:hover { background:rgba(255,255,255,.04); }
.search-item small { color:#666; display:block; font-size:12px; margin-top:2px; }
.section-title { font-size:11px; color:#555; margin:14px 0 6px 2px; text-transform:uppercase; letter-spacing:1.2px; font-weight:600; }
#home-scroll { flex:1; overflow-y:auto; padding-right:2px; }
#home-scroll::-webkit-scrollbar { width:3px; }
#home-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
.list-item { display:flex; align-items:center; gap:10px; padding:12px 14px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.04); border-radius:12px; margin-bottom:5px; cursor:pointer; font-size:14px; transition:background .15s, border-color .15s; }
.list-item:active { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.08); }
.list-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:14px; font-weight:500; }
.list-item .dt { color:#555; font-size:12px; white-space:nowrap; }
.list-item .icon-btn { background:none; border:none; color:#444; font-size:18px; cursor:pointer; padding:2px 4px; flex-shrink:0; transition:color .15s; }
.list-item .icon-btn:hover { color:#fff; }
.list-item .icon-btn.starred { color:#f1c40f; }

#home-footer { text-align:center; padding:8px 0 2px; color:#333; font-size:10px; letter-spacing:.3px; }
#home-footer b { color:#6C5CE7; }

/* ---- NAV (fullscreen map) ---- */
#nav { position:absolute; inset:0; z-index:100; display:none; }
#nav.active { display:block; }
#map { height:100%; width:100%; position:absolute; top:0; left:0; }

#nav-bottom { position:absolute; bottom:0; left:0; right:0; z-index:1000; background:linear-gradient(180deg,transparent 0%,rgba(10,10,15,.92) 30%); padding:24px 10px calc(env(safe-area-inset-bottom,0)+10px); backdrop-filter:blur(12px); }
#nav-panel { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:10px 8px; backdrop-filter:blur(20px); }
#nav-tiles { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-bottom:5px; }
.nav-tile { background:rgba(0,0,0,.3); border-radius:10px; padding:8px 2px; text-align:center; }
.nav-tile .t-val { font-size:24px; font-weight:700; color:#fff; line-height:1.2; }
.nav-tile .t-lbl { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:.6px; margin-top:1px; }
.tile-btn { background:rgba(0,0,0,.3); border-radius:10px; padding:8px 2px; text-align:center; border:none; color:#fff; font-weight:600; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:background .15s; }
.tile-btn:active { background:rgba(255,255,255,.1); }
.tile-btn .t-val { font-size:24px; font-weight:700; line-height:1.2; }
.tile-btn .t-lbl { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:.6px; margin-top:1px; }
.tile-btn.danger { background:rgba(200,0,0,.25); }
.tile-btn.danger .t-val { color:#ff4444; }

#nav-road { font-size:12px; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; text-align:center; font-weight:500; }


#sim-banner { position:fixed; top:12px; left:12px; z-index:10000; padding:5px 10px; border-radius:12px; background:rgba(108,92,231,.85); color:#fff; font-size:11px; font-weight:600; backdrop-filter:blur(8px); display:none; }
#sim-banner.on { display:block; }

.maplibregl-marker svg { display:block; filter:drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
.maplibregl-popup { max-width:200px; }
.maplibregl-popup-content { background:#1a1a2e !important; color:#fff !important; border-radius:10px !important; padding:8px 12px !important; font-size:13px !important; box-shadow:0 4px 20px rgba(0,0,0,.4) !important; border:1px solid rgba(255,255,255,.06) !important; }
.maplibregl-popup-tip { border-top-color:#1a1a2e !important; }
#nav-build { position:absolute; top:8px; right:8px; z-index:1001; color:#444; font-size:9px; padding:3px 8px; background:rgba(0,0,0,.4); border-radius:8px; backdrop-filter:blur(4px); }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Rota<span style="color:#6C5CE7">Elétrica</span></p><div class="sub" id="loading-status">Inicializando...</div></div>

<div id="sim-banner">🧪 SIM · 15 km/h</div>

<div id="home">
  <div id="home-header"><h1>Rota<span>Elétrica</span></h1><p>Navegação para triciclo elétrico</p></div>
  <div id="home-gps-area">
    <div id="home-gps-status" style="display:block;padding:10px 12px;border-radius:10px;font-size:14px;text-align:center;background:#0a0a0a;color:#888;">📍 Aguardando GPS...</div>
    <div id="home-gps-acc"></div>
  </div>
  <div id="home-search-bar">
    <input id="home-search" type="text" placeholder="Buscar endereço ou lugar..." autocomplete="off">
    <button id="home-btn-go">Mapa</button>
  </div>
  <div id="home-search-results"></div>
  <div id="home-scroll">
    <div class="section-title">Favoritos</div><div id="home-favs"></div>
    <div class="section-title">Histórico</div><div id="home-history"></div>
  </div>
  <div id="home-footer"></div>
</div>

<div id="nav">
  <div id="map"></div>


  <div id="set-home-bar" style="display:none;position:absolute;top:12px;left:8px;right:8px;z-index:1001;text-align:center;background:rgba(26,26,46,.92);backdrop-filter:blur(12px);padding:12px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.06);">
    <div style="color:#fff;font-size:14px;margin-bottom:10px;font-weight:500;">Clique no mapa para escolher sua casa</div>
    <button id="btn-confirm-home" style="padding:8px 24px;border:none;border-radius:10px;background:#6C5CE7;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px;box-shadow:0 4px 12px rgba(108,92,231,.3);">✅ Confirmar</button>
    <button id="btn-cancel-home" style="padding:8px 24px;border:none;border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-size:13px;cursor:pointer;">✕ Cancelar</button>
  </div>
  <div id="nav-build">v 29/06/2026 · production</div>
  <div id="nav-bottom">
    <div id="nav-panel">
      <div id="nav-road">--</div>
      <div id="nav-tiles">
        <div class="nav-tile"><div class="t-val" id="tile-speed">0</div><div class="t-lbl">Velocidade</div></div>
        <div class="nav-tile"><div class="t-val" id="stat-dist">--</div><div class="t-lbl">Distância</div></div>
        <div class="nav-tile"><div class="t-val" id="stat-time">--</div><div class="t-lbl">Chegada</div></div>
        <div class="nav-tile"><div class="t-val" id="stat-bat">--</div><div class="t-lbl">Bateria</div></div>
        <div class="nav-tile"><div class="t-val" id="nav-odo-val">0.0</div><div class="t-lbl">KM Total</div></div>
        <button class="tile-btn" id="btn-end-trip"><div class="t-val">Sair</div><div class="t-lbl">Encerrar</div></button>
      </div>
    </div>
  </div>
</div>

<script>
// ====== GRAPH ======
let HOME=null;
const TERMINAL_PADRE_ANCHIETA={lat:-22.861264,lng:-47.153290,address:'Terminal Padre Anchieta, Campinas'};
const BATTERY_RANGE_KM=35,RADIUS_KM=20;
let graphData=null;

function haversine(l1,g1,l2,g2){const R=6371000,dL=(l2-l1)*Math.PI/180,dG=(g2-g1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function gLat(i){return graphData.nn[i*2];}
function gLng(i){return graphData.nn[i*2+1];}
function nearestNode(lat,lng){if(!graphData)return null;const n=graphData.nn.length/2;let b=0,bD=Infinity;for(let i=0;i<n;i++){const d=haversine(lat,lng,gLat(i),gLng(i));if(d<bD){bD=d;b=i;}}return b;}

function dijkstra(fi,ti){
  const a=graphData.ad,n=a.length,d=new Float64Array(n),p=new Int32Array(n);d.fill(Infinity);p.fill(-1);d[fi]=0;
  const h=new Float64Array(n+1),hn=new Int32Array(n+1),pos=new Int32Array(n);pos.fill(-1);let hs=0;
  function pu(nd,v){let i=++hs;h[i]=v;hn[i]=nd;pos[nd]=i;while(i>1){const p=i>>1;if(h[p]<=h[i])break;[h[p],h[i]]=[h[i],h[p]];[hn[p],hn[i]]=[hn[i],hn[p]];pos[hn[p]]=p;pos[hn[i]]=i;i=p;}}
  function po(){if(!hs)return-1;const nd=hn[1];pos[nd]=-1;h[1]=h[hs];hn[1]=hn[hs];hs--;let i=1;while(1){let s=i,l=i<<1,r=l|1;if(l<=hs&&h[l]<h[s])s=l;if(r<=hs&&h[r]<h[s])s=r;if(s===i)break;[h[i],h[s]]=[h[s],h[i]];[hn[i],hn[s]]=[hn[s],hn[i]];pos[hn[i]]=i;pos[hn[s]]=s;i=s;}return nd;}
  function de(nd,v){let i=pos[nd];if(i===-1){pu(nd,v);return;}h[i]=v;while(i>1){const p=i>>1;if(h[p]<=h[i])break;[h[p],h[i]]=[h[i],h[p]];[hn[p],hn[i]]=[hn[i],hn[p]];pos[hn[p]]=p;pos[hn[i]]=i;i=p;}}
  pu(fi,0);
  while(hs>0){const u=po();if(u===ti||u===-1)break;const du=d[u],ed=a[u];if(!ed)continue;for(let k=0;k<ed.length;k++){const v=ed[k][0],w=ed[k][2],nd=du+w;if(nd<d[v]){d[v]=nd;p[v]=u;de(v,nd);}}}
  if(p[ti]===-1)return null;const r=[];for(let at=ti;at!==-1;at=p[at])r.push(at);return r.reverse();
}

function computeRoute(flat,flng,tlat,tlng){
  if(!graphData)return null;const fi=nearestNode(flat,flng),ti=nearestNode(tlat,tlng);
  if(fi===null||ti===null)return null;const path=dijkstra(fi,ti);if(!path)return null;
  const a=graphData.ad,nm=graphData.nm,hw=graphData.hw,sp=graphData.sp;const route=[];let tD=0;const segs=[];
  for(let i=0;i<path.length-1;i++){const u=path[i],v=path[i+1],ed=a[u];let e=null;for(let k=0;k<ed.length;k++){if(ed[k][0]===v){e=ed[k];break;}}if(!e)continue;route.push({lat:gLat(u),lng:gLng(u)});tD+=e[1];segs.push({lat:gLat(u),lng:gLng(u),name:nm[e[3]],highway:hw[e[4]],maxspeed:parseInt(sp[e[5]])||30});}
  route.push({lat:gLat(path[path.length-1]),lng:gLng(path[path.length-1])});const distKm=tD/1000;return{route,distance_km:Math.round(distKm*100)/100,duration_min:Math.round(distKm*4*10)/10,segments:segs};
}

function predictBattery(c){if(!c||c.length<2)return null;let k=0;for(let i=0;i<c.length-1;i++)k+=haversine(c[i].lat,c[i].lng,c[i+1].lat,c[i+1].lng)/1000;const p=(k/BATTERY_RANGE_KM)*100;return{range_consumed_pct:Math.round(p*10)/10,estimated_remaining_km:Math.max(0,Math.round((BATTERY_RANGE_KM-k)*10)/10),feasible:p<=100};}
function predictBatteryWithGrade(c,grades){if(!c||c.length<2)return null;let e=0;for(let i=0;i<c.length-1;i++){const d=haversine(c[i].lat,c[i].lng,c[i+1].lat,c[i+1].lng)/1000;const g=grades&&grades[i]!==undefined?grades[i]:0;let f;if(g>0.02)f=1.5;else if(g<-0.02)f=0.6;else f=1.0;e+=d*f;}const p=(e/BATTERY_RANGE_KM)*100;return{range_consumed_pct:Math.round(p*10)/10,estimated_remaining_km:Math.max(0,Math.round((BATTERY_RANGE_KM-e)*10)/10),feasible:p<=100};}

let geoCache={};
async function searchIndex(q){
  if(!graphData||!graphData.sr)return[];const w=q.toUpperCase().trim().split(/\s+/).filter(x=>x.length);if(!w.length)return[];
  const nm=graphData.nm,hw=graphData.hw;const hc=HOME?(r)=>haversine(HOME.lat,HOME.lng,r.lat,r.lng)/1000<=RADIUS_KM:()=>true;
  const r=[];for(const x of graphData.sr.r){const xn=nm[x.n];let s=0;for(const z of w)if(xn.toUpperCase().includes(z))s++;if(s&&(!HOME||hc(x)))r.push({type:'road',name:xn,highway:hw[x.h],lat:x.lat,lng:x.lng,score:s});}
  // Nomimatim geocoding for addresses (if looks like an address)
  if(q.length>8&&!/^\d+$/.test(q)&&geoCache[q]===undefined)try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=3&q='+encodeURIComponent(q)+'&countrycodes=br',{headers:{'User-Agent':'RotaEletrica/1.0'}});
    if(res.ok){const data=await res.json();geoCache[q]=data;for(const g of data)if(g.lat&&g.lon&&(!HOME||haversine(HOME.lat,HOME.lng,parseFloat(g.lat),parseFloat(g.lon))/1000<=RADIUS_KM))r.push({type:'address',name:g.display_name,lat:parseFloat(g.lat),lng:parseFloat(g.lon),score:99});}
  }catch(e){}
  r.sort((a,b)=>b.score-a.score);return r.slice(0,20);
}

function revGeo(lat,lng){if(!graphData||!graphData.sr)return null;const nm=graphData.nm,hw=graphData.hw;let b=null,bD=Infinity;for(const r of graphData.sr.r){const d=Math.abs(r.lat-lat)+Math.abs(r.lng-lng);if(d<bD){bD=d;b=r;}}return b?{name:nm[b.n],highway:hw[b.h],lat:b.lat,lng:b.lng}:null;}

// ====== DB ======
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('RE',2);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('t'))d.createObjectStore('t',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('f'))d.createObjectStore('f',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('o'))d.createObjectStore('o',{keyPath:'id'});if(!d.objectStoreNames.contains('r'))d.createObjectStore('r',{keyPath:'id',autoIncrement:true});};q.onsuccess=e=>r(e.target.result);q.onerror=e=>j(e.target.error);});}
async function ga(s){const d=await openDB();return new Promise(r=>{const t=d.transaction(s,'readonly'),q=t.objectStore(s).getAll();q.onsuccess=()=>{r(q.result||[]);d.close()};q.onerror=()=>{r([]);d.close()};});}
async function ad(s,o){const d=await openDB();const t=d.transaction(s,'readwrite');return new Promise(r=>{const q=t.objectStore(s).add(o);q.onsuccess=()=>{r(q.result);d.close()};q.onerror=()=>{d.close()};});}
async function pt(s,o){const d=await openDB();const t=d.transaction(s,'readwrite');t.objectStore(s).put(o);t.oncomplete=()=>d.close();}
async function dl(s,i){const d=await openDB();const t=d.transaction(s,'readwrite');t.objectStore(s).delete(i);t.oncomplete=()=>d.close();}
const db={trips:()=>ga('t'),addTrip:o=>ad('t',{...o,created_at:Math.floor(Date.now()/1000)}),favs:()=>ga('f'),addFav:(n,la,ln)=>ad('f',{name:n,lat:la,lng:ln,created_at:Math.floor(Date.now()/1000)}),updFav:o=>pt('f',o),delFav:i=>dl('f',i),recents:()=>ga('r'),
  addRecent:async function(n,la,ln){const all=await ga('r');const dup=all.find(x=>Math.abs(x.lat-la)<1e-4&&Math.abs(x.lng-ln)<1e-4);if(dup){dup.created_at=Math.floor(Date.now()/1000);await pt('r',dup);}else await ad('r',{name:n,lat:la,lng:ln,created_at:Math.floor(Date.now()/1000)});},
  odo:()=>new Promise(async r=>{const d=await openDB();const t=d.transaction('o','readonly');const q=t.objectStore('o').get(1);q.onsuccess=()=>{r(q.result?q.result.km:0);d.close()};q.onerror=()=>{r(0);d.close()};}),setOdo:k=>pt('o',{id:1,km:k,updated_at:Date.now()}),
  bat:()=>new Promise(async r=>{const d=await openDB();const t=d.transaction('o','readonly');const q=t.objectStore('o').get(2);q.onsuccess=()=>{r(q.result?q.result.pct:100);d.close()};q.onerror=()=>{r(100);d.close()};}),setBat:p=>pt('o',{id:2,pct:p,updated_at:Date.now()}),
  home:()=>new Promise(async r=>{const d=await openDB();const t=d.transaction('o','readonly');const q=t.objectStore('o').get(3);q.onsuccess=()=>{r(q.result?{lat:q.result.lat,lng:q.result.lng,address:q.result.address||'Casa'}:null);d.close()};q.onerror=()=>{r(null);d.close()};}),setHome:(la,ln,addr)=>pt('o',{id:3,lat:la,lng:ln,address:addr||'Casa',updated_at:Date.now()})};

// ====== MAPLIBRE GL ======
const map = new maplibregl.Map({
  container:'map', style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center:HOME?[HOME.lng,HOME.lat]:[-47.0,-15.0], zoom:HOME?16:4, attributionControl:false,
});
// zoom buttons intentionally removed — clean nav UI
map.touchZoomRotate.enable(); map.dragRotate.enable();

let curMkr=null,dstMkr=null,routeLayers=[],curPos=null,rCoords=null,rawPos=null;
let isNav=false,dst=null,wid=null,lOP=null,sLat=null,sLng=null,tStart=null,accDist=0,homeMkr=null,_settingHome=false,_homeClick=null,_homeTempMkr=null,_homeSet=false,_lastTouch=0;
let navActive=false;
// Bearing lock — prevents false map rotations from noisy GPS heading
let _stableBearing=0,_bearingConfidence=0;
const BEARING_LOCK_THRESHOLD=3;  // consecutive confirmations needed for reversal

// ====== SMOOTH CAMERA FOLLOW ======
// Continuous rAF loop. The camera exponentially decays toward the latest
// GPS-projected position + heading, so the map glides instead of jumping every
// position update. The position target comes from projectToRoute() (not the
// snap-fitted nearest node) so the camera actually moves along long segments.
let _camTarget = null;          // {lng, lat, bearing} or null
let _camFollow = true;          // false when the user drags the map (re-enabled by the recenter button)
const _camPosK = 0.15;          // position smoothing — slower for visible continuous movement
const _camBearK = 0.15;         // bearing smoothing

function _lerpAngle(a, b, t) {
  let d = ((b - a + 540) % 360) - 180;
  return (a + d * t + 360) % 360;
}

// Stable bearing — small corrections pass through immediately, reversals
// require 3 consecutive confirmations. Prevents false map rotations from
// noisy GPS heading when riding straight.
function updateBearing(newHdg) {
  if (newHdg===null||newHdg===undefined||isNaN(newHdg)||!isFinite(newHdg)) return _stableBearing;
  if (_bearingConfidence===0) { _stableBearing=newHdg; _bearingConfidence=1; return _stableBearing; }
  const diff=Math.abs(((newHdg-_stableBearing+540)%360)-180);
  if (diff<30) {
    _stableBearing=newHdg;
    _bearingConfidence=Math.min(_bearingConfidence+1,10);
  } else if (diff>90) {
    _bearingConfidence=Math.max(0,_bearingConfidence-2);
    if (_bearingConfidence<=0) { _stableBearing=newHdg; _bearingConfidence=1; }
  } else {
    _bearingConfidence=Math.max(0,_bearingConfidence-1);
    if (_bearingConfidence<=0) { _stableBearing=newHdg; _bearingConfidence=1; }
  }
  return _stableBearing;
}

function _camSetTarget(lng, lat, heading, zoom) {
  if (_camTarget === null) _camTarget = { lng, lat, bearing: 0 };
  _camTarget.lng = lng;
  _camTarget.lat = lat;
  if (heading !== null && heading !== undefined && !isNaN(heading) && isFinite(heading)) {
    _camTarget.bearing = heading;
  }
  if (zoom !== undefined && zoom !== null) _camTarget.zoom = zoom;
}

function _camTick() {
  if (_camTarget && _camFollow && isNav && map) {
    const cur = map.getCenter();
    const dx = _camTarget.lng - cur.lng;
    const dy = _camTarget.lat - cur.lat;
    const opts = {};
    let dirty = false;
    if (dx * dx + dy * dy > 1e-11) {
      opts.center = [cur.lng + dx * _camPosK, cur.lat + dy * _camPosK];
      dirty = true;
    }
    const curB = map.getBearing();
    const tB = _camTarget.bearing;
    const dB = Math.abs(((tB - curB + 540) % 360) - 180);
    if (dB > 0.1) {
      opts.bearing = _lerpAngle(curB, tB, _camBearK);
      dirty = true;
    }
    if (_camTarget.zoom !== undefined) {
      const curZ = map.getZoom();
      const dZ = _camTarget.zoom - curZ;
      if (Math.abs(dZ) > 0.05) {
        opts.zoom = curZ + dZ * _camPosK;
        dirty = true;
      }
    }
    if (dirty) map.jumpTo(opts);
  }
  requestAnimationFrame(_camTick);
}
requestAnimationFrame(_camTick);

function elm(html){const d=document.createElement('div');d.innerHTML=html;return d.firstElementChild;}

function roadCol(hwy){const local={'residential':1,'unclassified':1,'living_street':1,'service':1};return local[hwy]?'#e67e22':'#2ecc71';}

function setGpsStatus(cls, msg, acc){
  const el=document.getElementById('home-gps-status');
  const icons={busy:'⏳',ok:'📍',err:'⚠️',warn:'⚠️'};
  el.innerHTML=`${icons[cls]||''} ${msg}`;
  el.style.background=cls==='busy'?'#1a1a1a':cls==='ok'?'#0d3320':cls==='err'?'#3a0d0d':'#332a0d';
  el.style.color=cls==='busy'?'#aaa':cls==='ok'?'#6ee7a3':cls==='err'?'#ff8888':'#ffd866';
  document.getElementById('home-gps-acc').textContent=acc?'precisão: '+(acc<1000?Math.round(acc)+' m':(acc/1000).toFixed(1)+' km'):'';
}

function onFix(p, source){
  const {latitude:la,longitude:ln,heading:h=null,speed:sp=null,accuracy:a=null}=p.coords;
  rawPos={lat:la,lng:ln};

  // Project the raw fix onto the route so the camera glides smoothly along the
  // road between sparse graph nodes. Falls back to the raw fix when off-route.
  let posLat=la,posLng=ln;
  const proj=rCoords&&rCoords.length>1?projectToRoute(la,ln,rCoords):null;
  if(proj&&proj.dist<200){posLat=proj.lat;posLng=proj.lng;}

  // Snap-fitted position (nearest graph node) — used for routing and reverse-
  // geocoding, but NOT for the camera, because the snap freezes on long segments.
  const ni=nearestNode(la,ln);let sla=la,sln=ln;
  if(ni!==null&&graphData){sla=gLat(ni);sln=gLng(ni);}
  curPos={lat:sla,lng:sln,heading:h,speed:sp};

  if(!curMkr){
    const e=elm('<svg viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 4,22 12,16 20,22" fill="#6C5CE7" stroke="#fff" stroke-width="1.5"/></svg>');
    // rotationAlignment:'viewport' keeps the arrow pointing UP on screen so it
    // always shows the direction of travel once the map is rotated to heading-up.
    curMkr=new maplibregl.Marker({element:e,rotationAlignment:'viewport'}).setLngLat([posLng,posLat]).addTo(map);
  }
  else curMkr.setLngLat([posLng,posLat]);

  if(isNav){
    // Heading: use the GPS heading; fall back to the route direction when the
    // device hasn't sent one yet (SIM, stationary user, cold start). MapLibre
    // bearing = heading so that direction of travel sits at the top of screen.
    // Bearing lock filters out noisy / false-positive direction changes.
    let rawHdg=h;
    if(rawHdg===null||rawHdg===undefined||isNaN(rawHdg)||!isFinite(rawHdg)){
      rawHdg=routeHeadingAt(la,ln,rCoords);
    }
    const camHdg=updateBearing(rawHdg);
    _camSetTarget(posLng,posLat,camHdg);
  }
  updateSpeedDisplay(sp);
  const r=revGeo(sla,sln);document.getElementById('nav-road').textContent=r?r.name:'--';
  if(source==='one-shot'||source==='one-shot-ha'){setGpsStatus('ok','GPS pronto ('+source+')',a);
    if(!isNav&&!navActive&&curMkr)map.flyTo({center:[posLng,posLat],zoom:16,duration:800});}
  else setGpsStatus('ok','GPS ativo · '+(a<50?'excelente':a<200?'bom':'fraco'),a);
}

function startWatch(){
  if(wid!==null)return;
  wid=navigator.geolocation.watchPosition(p=>onFix(p,'watch'), err=>gpsErr(err), {enableHighAccuracy:true,maximumAge:2000,timeout:15000});
}

function gpsErr(err){
  const msgs={1:'GPS negado pelo navegador — ative a permissão nas configurações do site',2:'GPS indisponível neste aparelho',3:'GPS demorou demais — tentando de novo'};
  const msg=msgs[err.code]||('Erro GPS: '+(err.message||err.code));
  setGpsStatus('err',msg,null);
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
}

function requestGPS(){
  if(!('geolocation' in navigator)){setGpsStatus('err','Seu navegador não tem GPS',null);return;}
  setGpsStatus('busy','Pedindo permissão...',null);
  // Step 1: fast low-accuracy one-shot to get any fix
  navigator.geolocation.getCurrentPosition(
    p=>{onFix(p,'one-shot');startWatch();},
    err=>{
      // Common iOS case: denied. Try high-accuracy as a fallback once.
      if(err.code===1){gpsErr(err);return;}
      setGpsStatus('busy','Tentando com alta precisão...',null);
      navigator.geolocation.getCurrentPosition(
        p=>{onFix(p,'one-shot-ha');startWatch();},
        err2=>gpsErr(err2),
        {enableHighAccuracy:true,timeout:20000,maximumAge:0}
      );
    },
    {enableHighAccuracy:false,timeout:10000,maximumAge:0}
  );
}

function startTrack(){
  // kept for legacy callers — now just delegates to requestGPS
  requestGPS();
}

function updateSpeedDisplay(sp) {
  document.getElementById('tile-speed').textContent = sp !== null ? Math.round(sp * 3.6) : 0;
}

function renderRoute(segs) {
  clearRoute(); if(!segs||segs.length<2)return;
  if(!map.isStyleLoaded()){map.once('style.load',()=>renderRoute(segs));return;}
  let roadSegs=segs.slice(0),approach=null;
  for(let i=segs.length-1;i>=0;i--){if(segs[i].highway===''){roadSegs=segs.slice(0,i);approach=[segs[i-1],segs[i]];break;}}
  // group by color (green vs orange)
  if(roadSegs.length>1){
    let grp=[roadSegs[0]],c=roadCol(roadSegs[0].highway);
    for(let i=1;i<roadSegs.length;i++){
      const nc=roadCol(roadSegs[i].highway);
      if(nc===c)grp.push(roadSegs[i]);
      else{_rl(grp,c);grp=[roadSegs[i-1],roadSegs[i]];c=nc;}
    }
    if(grp.length>1)_rl(grp,c);
  }
  if(approach)_rl(approach,roadCol(approach[0].highway),false);
}
function _rl(g,c,dash){
  const id='rl_'+routeLayers.length;
  map.addSource(id,{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:g.map(x=>[x.lng,x.lat])}}});
  const paint={'line-color':c,'line-width':dash?4:5,'line-opacity':0.9};
  if(dash)paint['line-dasharray']=[2,4];
  map.addLayer({id,type:'line',source:id,paint});
  routeLayers.push(id);
}
function clearRoute(){
  routeLayers.forEach(id=>{if(map.getLayer(id))map.removeLayer(id);if(map.getSource(id))map.removeSource(id);});
  routeLayers=[];
}

function doRoute(flat,flng,tlat,tlng){
  const r=computeRoute(flat,flng,tlat,tlng);if(!r){alert('Rota não encontrada');return null;}
  // find best front-door point by projecting destination onto nearby road edges
  const ti=nearestNode(tlat,tlng);
  let fx=tlat,fy=tlng,fn='';
  if(ti!==null&&graphData){
    const edges=graphData.ad[ti],nm=graphData.nm;let bestD=Infinity;
    for(let k=0;k<edges.length;k++){
      const e=edges[k],v=e[0],lat1=gLat(ti),lng1=gLng(ti),lat2=gLat(v),lng2=gLng(v);
      const dx=lat2-lat1,dy=lng2-lng1,d2=dx*dx+dy*dy;
      if(d2<1e-14)continue;
      const t=Math.max(0,Math.min(1,((tlat-lat1)*dx+(tlng-lng1)*dy)/d2));
      const px=lat1+t*dx,py=lng1+t*dy;
      const dd=haversine(tlat,tlng,px,py);
      if(dd<bestD){bestD=dd;fx=px;fy=py;fn=nm[e[3]];}
    }
  }
  const last=r.segments[r.segments.length-1];
  if(last&&haversine(last.lat,last.lng,fx,fy)>5){r.segments.push({lat:fx,lng:fy,name:fn||last.name,highway:'',maxspeed:last.maxspeed||20});r.route.push({lat:fx,lng:fy});}
  rCoords=r.route;renderRoute(r.segments);
  document.getElementById('stat-dist').textContent=r.distance_km;document.getElementById('stat-time').textContent=fmtChegada(r.duration_min);
  fitR();return r;
}
function fitR(){
  if(rCoords&&rCoords.length>1){
    const lngs=rCoords.map(c=>c.lng),lats=rCoords.map(c=>c.lat);
    const minLng=Math.min(...lngs),maxLng=Math.max(...lngs),minLat=Math.min(...lats),maxLat=Math.max(...lats);
    const span=haversine((minLat+maxLat)/2,minLng,(minLat+maxLat)/2,maxLng)/1000;
    if(span>50){map.setZoom(13);return;}
    map.fitBounds([[minLng,minLat],[maxLng,maxLat]],{padding:10});
  }
}

// Pre-check permission state to give the user a clear path
async function checkPerm(){
  if(!navigator.permissions||!navigator.permissions.query){return;}
  try{
    const r=await navigator.permissions.query({name:'geolocation'});
    if(r.state==='denied')setGpsStatus('warn','Permissão de GPS negada — ative nas configurações do navegador',null);
    r.addEventListener('change',()=>{if(r.state==='granted')requestGPS();});
  }catch(e){}
}

setInterval(()=>{
  if(isNav&&!_camFollow&&_lastTouch&&Date.now()-_lastTouch>5000){
    const src=rawPos||curPos;
    if(!src)return;
    let lat=src.lat,lng=src.lng;
    const proj=rCoords&&rCoords.length>1?projectToRoute(lat,lng,rCoords):null;
    if(proj&&proj.dist<200){lat=proj.lat;lng=proj.lng;}
    const hdg=updateBearing(routeHeadingAt(lat,lng,rCoords));
    _camSetTarget(lng,lat,hdg!==null?hdg:0,17);
    _camFollow=true;
  }
},1000);

// ====== HOME: HISTORY (trips + recents merged, deduped by location) ======
async function rHistory(){const t=await db.trips(),r=await db.recents();const e=document.getElementById('home-history');e.innerHTML='';
  const best=new Map();
  for(const x of t){const k=x.to_lat+','+x.to_lng;const old=best.get(k);
    if(!old||(x.created_at||0)>(old.created_at||0))best.set(k,{type:'trip',name:x.to_name||'Destino',lat:x.to_lat,lng:x.to_lng,distance_km:x.distance_km,created_at:x.created_at,id:'t'+x.id});}
  for(const x of r){const k=x.lat+','+x.lng;if(best.has(k))continue;
    const old=best.get(k);
    if(!old||(x.created_at||0)>(old.created_at||0))best.set(k,{type:'recent',name:x.name,lat:x.lat,lng:x.lng,created_at:x.created_at,id:'r'+x.id});}
  const items=[...best.values()].sort((a,b)=>(b.created_at||0)-(a.created_at||0));
  if(!items.length){e.innerHTML='<div style="color:#555;font-size:12px;padding:4px;">Nenhum histórico</div>';return;}
  const favs=await db.favs();
  let shown=0;
  for(const x of items){
    if(shown>=15)break;
    const isFav=favs.some(f=>Math.abs(f.lat-x.lat)<1e-4&&Math.abs(f.lng-x.lng)<1e-4);
    if(isFav)continue;
    shown++;
    const d=document.createElement('div');d.className='list-item';const dt=new Date((x.created_at||0)*1000);
    d.innerHTML=`<span class="name">${x.name}</span><small class="dt">${dt.toLocaleDateString('pt-BR')}</small><button class="icon-btn" data-a="fav">&#9734;</button><button class="icon-btn" data-a="del">&times;</button>`;
    d.addEventListener('click',(e)=>{if(e.target.closest('.icon-btn'))return;goToNav(x.lat,x.lng,x.name);});
    d.querySelector('[data-a=fav]').addEventListener('click',async e=>{e.stopPropagation();
      await db.addFav(x.name,x.lat,x.lng);
      rFavs();rHistory();});
    d.querySelector('[data-a=del]').addEventListener('click',async e=>{e.stopPropagation();
      if(x.type==='trip')await dl('t',parseInt(x.id.slice(1),10));
      else await dl('r',parseInt(x.id.slice(1),10));
      rHistory();});
    e.appendChild(d);
  }
  if(!shown)e.innerHTML='<div style="color:#555;font-size:12px;padding:4px;">Nenhum histórico</div>';
}

// ====== ODOMETER ======
async function upOdo(){const k=await db.odo();document.getElementById('nav-odo-val').textContent=k.toFixed(1);}
async function upBattery(){const p=await db.bat();document.getElementById('stat-bat').textContent=p.toFixed(1);}
function fmtChegada(min){const pad=n=>String(n).padStart(2,'0');const d=new Date(Date.now()+min*60000);return Math.round(min)+'′ '+pad(d.getHours())+':'+pad(d.getMinutes());}

// Distance (meters) from (lat,lng) to nearest point on a polyline of {lat,lng} points.
function distToRoute(lat, lng, route){
  if(!route||route.length<2)return Infinity;
  let minD=Infinity;
  for(let i=1;i<route.length;i++){
    const a=route[i-1],b=route[i];
    const dx=b.lng-a.lng,dy=b.lat-a.lat;
    const len2=dx*dx+dy*dy;
    if(len2<1e-14)continue;
    let t=((lng-a.lng)*dx+(lat-a.lat)*dy)/len2;
    if(t<0)t=0;else if(t>1)t=1;
    const px=a.lng+t*dx,py=a.lat+t*dy;
    const dd=haversine(lat,lng,py,px);
    if(dd<minD)minD=dd;
  }
  return minD;
}

// Project (lat,lng) onto the polyline — returns the snapped point on the route,
// the distance to it, and the index of the closest segment. Used to keep the
// camera + marker smoothly on the road between sparse graph nodes.
function projectToRoute(lat, lng, route){
  if(!route||route.length<2)return null;
  let minD=Infinity, bestLat=null, bestLng=null, bestI=null;
  for(let i=1;i<route.length;i++){
    const a=route[i-1],b=route[i];
    const dx=b.lng-a.lng,dy=b.lat-a.lat;
    const len2=dx*dx+dy*dy;
    if(len2<1e-14)continue;
    let t=((lng-a.lng)*dx+(lat-a.lat)*dy)/len2;
    if(t<0)t=0;else if(t>1)t=1;
    const px=a.lng+t*dx,py=a.lat+t*dy;
    const dd=haversine(lat,lng,py,px);
    if(dd<minD){minD=dd;bestLat=py;bestLng=px;bestI=i;}
  }
  return minD<Infinity ? {dist:minD, lat:bestLat, lng:bestLng, segmentIndex:bestI} : null;
}

// Heading (degrees, 0=north) of the route segment the user is currently on.
// Used as a fallback when the GPS device doesn't provide a heading (stationary,
// cold start, or simulation).
function routeHeadingAt(lat, lng, route){
  const p=projectToRoute(lat, lng, route);
  if(!p||p.segmentIndex==null)return null;
  const a=route[p.segmentIndex-1], b=route[p.segmentIndex];
  if(!a||!b)return null;
  const dy=b.lat-a.lat;
  const dx=(b.lng-a.lng)*Math.cos(lat*Math.PI/180);
  return (Math.atan2(dx, dy)*180/Math.PI+360)%360;
}

// ====== NAV LOOP ======
const REROUTE_THRESHOLD_M = 50;  // off-route distance that triggers auto-reroute
let _rerouteCount = 0;
setInterval(async()=>{
  if(isNav&&curPos&&dst){
    const d=haversine(curPos.lat,curPos.lng,dst.lat,dst.lng);
    if(d<30){saveTrip();alert('Você chegou!');isNav=false;tStart=null;map.setBearing(0);showHome();return;}
    if(lOP){
      const delta=haversine(curPos.lat,curPos.lng,lOP.lat,lOP.lng);
      if(delta>5){accDist+=delta;const k=await db.odo();await db.setOdo(k+delta/1000);upOdo();
        // update remaining distance and time
        const remKm=haversine(curPos.lat,curPos.lng,dst.lat,dst.lng)/1000;
        document.getElementById('stat-dist').textContent=remKm.toFixed(1);
        document.getElementById('stat-time').textContent=fmtChegada(remKm*4);
        // battery drain: speed-based factor mimics uphill/downhill
        const spd=curPos.speed!==null?curPos.speed*3.6:0;
        if(spd>0){
          const p=await db.bat();
          const baseDrainPerKm=100/BATTERY_RANGE_KM;
          let factor;
          if(spd<=8) factor=1.5;      // slow = uphill / heavy
          else if(spd<=18) factor=1.0; // normal cruise
          else factor=0.6;             // fast = downhill / assisted
          const drain=(delta/1000)*baseDrainPerKm*factor;
          await db.setBat(Math.max(0,p-drain));
          upBattery();
        }
    }
    // auto-reroute if we've wandered off the planned route (use snapped curPos
    // so the route adapts to wherever the user actually is on the road network)
    if(isNav&&curPos&&rCoords&&rCoords.length>1){
      const offDist=distToRoute(curPos.lat,curPos.lng,rCoords);
      if(offDist>REROUTE_THRESHOLD_M){
        _rerouteCount++;
        const r=doRoute(curPos.lat,curPos.lng,dst.lat,dst.lng);
        if(r){
          console.log(`[reroute #${_rerouteCount}] off by ${offDist.toFixed(0)}m → new route ${r.distance_km}km`);
          if(typeof SIM!=='undefined'&&SIM.on)SIM.lastRouteRef=null;
        }
      }
    }
    lOP=curPos;
  }
},3000);

// ====== SIM (dev only — local network or quick tunnel) ======
const DEV_SIM = (() => {
  const h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1' || h === '') return true;
  if (/^192\.168\./.test(h)) return true;
  if (/^10\./.test(h)) return true;
  if (/^172\.(1[6-9]|2\d|3[01])\./.test(h)) return true;
  if (/\.trycloudflare\.com$/.test(h)) return true;
  return false;
})();

const SIM = {
  on: DEV_SIM,
  lat: TERMINAL_PADRE_ANCHIETA.lat,
  lng: TERMINAL_PADRE_ANCHIETA.lng,
  spd: 0,
  hdg: 0,
  acc: 8,
  speedKmh: 15,
  route: null,
  cum: null,
  total: 0,
  at: 0,
  lastT: 0,
  tickId: null,
  wIds: new Map(),
  lastRouteRef: null,
  _lastSeg: -1,
  _segCount: 0,
  _lastMissT: 0,
};

function simMakeCoords() {
  return {
    coords: {
      latitude: SIM.lat,
      longitude: SIM.lng,
      accuracy: SIM.acc,
      altitude: null,
      altitudeAccuracy: null,
      heading: SIM.hdg,
      speed: SIM.spd,
    },
    timestamp: Date.now(),
  };
}

function simSetRoute(route) {
  if (!route || route.length < 2) {
    SIM.route = null;
    SIM.cum = null;
    SIM.total = 0;
    SIM.at = 0;
    return;
  }
  SIM.route = route;
  SIM.cum = [0];
  for (let i = 1; i < route.length; i++) {
    SIM.cum.push(SIM.cum[i-1] + haversine(route[i-1].lat, route[i-1].lng, route[i].lat, route[i].lng));
  }
  SIM.total = SIM.cum[SIM.cum.length - 1];
  SIM.at = 0;
  SIM._lastMissT = performance.now();
  // Seed the heading with the first segment direction so the very first fix
  // already carries a valid bearing (avoids a north-up freeze at sim start).
  const a = route[0], b = route[1];
  const dy = b.lat - a.lat;
  const dx = (b.lng - a.lng) * Math.cos(a.lat * Math.PI / 180);
  SIM.hdg = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
}

function simAdvance(distM) {
  if (!SIM.route) return;
  SIM.at += distM;
  if (SIM.at >= SIM.total) {
    SIM.at = SIM.total;
    const p = SIM.route[SIM.route.length - 1];
    SIM.lat = p.lat;
    SIM.lng = p.lng;
    SIM.spd = 0;
    return;
  }
  let i = 1;
  while (i < SIM.cum.length && SIM.cum[i] < SIM.at) i++;
  if (i !== SIM._lastSeg) { SIM._segCount++; SIM._lastSeg = i; }
  const i0 = i - 1;
  const i1 = i;
  const segLen = SIM.cum[i1] - SIM.cum[i0];
  const t = segLen > 0 ? (SIM.at - SIM.cum[i0]) / segLen : 0;
  const p0 = SIM.route[i0];
  const p1 = SIM.route[i1];
  SIM.lat = p0.lat + t * (p1.lat - p0.lat);
  SIM.lng = p0.lng + t * (p1.lng - p0.lng);
  const dy = (p1.lat - p0.lat);
  const dx = (p1.lng - p0.lng) * Math.cos(SIM.lat * Math.PI / 180);
  SIM.hdg = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
  SIM.spd = SIM.speedKmh * 1000 / 3600;
  // miss the next turn: push 100m left of the road to trigger auto-reroute
  if (SIM._segCount >= 1 && performance.now() - SIM._lastMissT > 5000) {
    const ang = SIM.hdg * Math.PI / 180 - Math.PI / 2;  // left side
    const d = 0.001;
    SIM.lat += Math.cos(ang) * d;
    SIM.lng += Math.sin(ang) * d / Math.cos(SIM.lat * Math.PI / 180);
    SIM._segCount = 0;
    SIM._lastMissT = performance.now();
  }
}

function simTick() {
  if (!SIM.on) return;
  const now = performance.now();
  const dt = (now - SIM.lastT) / 1000;
  SIM.lastT = now;
  if (typeof rCoords !== 'undefined' && rCoords && rCoords !== SIM.lastRouteRef) {
    simSetRoute(rCoords);
    SIM.lastRouteRef = rCoords;
    SIM._segCount = 0;
    SIM._lastSeg = -1;
  }
  if (SIM.route) {
    simAdvance(SIM.speedKmh * 1000 / 3600 * dt);
  }
  const c = simMakeCoords();
  SIM.wIds.forEach(cb => { try { cb(c); } catch(e) {} });
}

function startSim() {
  if (!SIM.on || SIM.tickId) return;
  SIM.lat = TERMINAL_PADRE_ANCHIETA.lat;
  SIM.lng = TERMINAL_PADRE_ANCHIETA.lng;
  SIM.lastT = performance.now();
  SIM.tickId = setInterval(simTick, 1000);
  document.getElementById('sim-banner').classList.add('on');
  console.log('[SIM] started, 15 km/h, dev mode');
}

function patchGeolocation() {
  if (!SIM.on) return;
  navigator.geolocation.getCurrentPosition = function(succ, err) {
    setTimeout(() => { if (succ) succ(simMakeCoords()); }, 80);
  };
  let nextId = 1;
  navigator.geolocation.watchPosition = function(succ, err) {
    const id = nextId++;
    if (succ) SIM.wIds.set(id, succ);
    return id;
  };
  navigator.geolocation.clearWatch = function(id) {
    SIM.wIds.delete(id);
  };
  console.log('[SIM] navigator.geolocation patched');
}

// ====== INIT ======
let _initRan = false;
async function init(){
  if (_initRan) return;
  _initRan = true;
  checkPerm();
  if (DEV_SIM) {
    document.getElementById('loading-status').textContent='Iniciando simulação...';
  }
  const saved=await db.home();if(saved){if(!HOME) HOME={};HOME.lat=saved.lat;HOME.lng=saved.lng;HOME.address=saved.address;_homeSet=true;}
  const now=new Date();const pad=n=>String(n).padStart(2,'0');
  document.getElementById('home-footer').innerHTML=`Atualizado em <b>${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} · ${pad(now.getHours())}:${pad(now.getMinutes())}</b>`;
  if(_homeSet){
    const he=elm('<div style="font-size:28px;line-height:1;text-align:center;">🏠</div>');
    homeMkr=new maplibregl.Marker({element:he}).setLngLat([HOME.lng,HOME.lat]).setPopup(new maplibregl.Popup().setText(HOME.address)).addTo(map);
    await upsertCasaFav();
  }
  rFavs();rHistory();upOdo();upBattery();
  try{
    const [nnR,adR,metaR]=await Promise.all([fetch('graph-nn.json'),fetch('graph-ad.json'),fetch('graph-meta.json')]);
    const [nnD,adD,metaD]=await Promise.all([nnR.json(),adR.json(),metaR.json()]);
    graphData={...nnD,...adD,...metaD};
    document.getElementById('loading-status').textContent=`Pronto (${(graphData.nn.length/2/1000).toFixed(0)}k pontos)`;
    setTimeout(()=>document.getElementById('loading').classList.add('hide'),500);
  }catch(e){document.getElementById('loading-status').textContent='Erro';console.error(e);}
  if (DEV_SIM) {
    patchGeolocation();
    startSim();
  }
  setTimeout(()=>requestGPS(), 300);
}
if(map.isStyleLoaded())init();else{map.on('load',init);setTimeout(init,5000);}
</script>
